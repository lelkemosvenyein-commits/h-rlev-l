<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliratkozás</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: transparent; }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 520px;
    }

    .title {
      font-size: 18px;
      font-weight: 500;
      color: #111;
      margin-bottom: 1.25rem;
    }

    .field { margin-bottom: 0.75rem; }

    .field input[type=text],
    .field input[type=email] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      background: #fff;
      outline: none;
    }

    .field input:focus { border-color: #aaa; }
    .field input.error { border-color: #c0392b; }

    .err-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: 4px;
      min-height: 16px;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 1rem 0 1.25rem;
    }

    .checkbox-row input[type=checkbox] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .checkbox-row label {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .submit-btn {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #111;
      cursor: pointer;
    }

    .submit-btn:hover { background: #f5f5f5; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 1.5rem 0;
    }

    .success-icon {
      font-size: 36px;
      color: #2a7a2a;
    }

    .success-title {
      font-size: 16px;
      font-weight: 500;
      color: #111;
      margin: 0.75rem 0 0.25rem;
    }

    .success-sub {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">Szeretnék értesülni az eseményekről</div>

  <div id="formArea">
    <div class="field">
      <input type="text" id="nev" placeholder="Nevem" maxlength="100" />
      <div class="err-msg" id="nevErr"></div>
    </div>
    <div class="field">
      <input type="email" id="email" placeholder="Email címem" maxlength="200" />
      <div class="err-msg" id="emailErr"></div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="cb" />
      <label for="cb">Kérek értesítést a további eseményekről, inspiráló tartalmakról.</label>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submit()">Feliratkozom</button>
  </div>

  <div class="success" id="successArea">
    <div class="success-icon">✓</div>
    <div class="success-title">Sikeresen feliratkoztál!</div>
    <div class="success-sub">Hamarosan értesítünk az eseményekről.</div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwc2NXDAFhARzSj_mvXLqXtfdScuyKlp0cRIm3viFKFzJh1FTOsaTy_8GCFrMymiW4/exec';

  async function submit() {
    const nev = document.getElementById('nev');
    const email = document.getElementById('email');
    const cb = document.getElementById('cb');
    const btn = document.getElementById('submitBtn');
    let ok = true;

    document.getElementById('nevErr').textContent = '';
    document.getElementById('emailErr').textContent = '';
    nev.classList.remove('error');
    email.classList.remove('error');

    if (!nev.value.trim()) {
      document.getElementById('nevErr').textContent = 'Kérjük add meg a neved.';
      nev.classList.add('error');
      ok = false;
    }
    if (!email.value.trim() || !email.value.includes('@')) {
      document.getElementById('emailErr').textContent = 'Kérjük adj meg egy érvényes email címet.';
      email.classList.add('error');
      ok = false;
    }
    if (!ok) return;

    btn.disabled = true;
    btn.textContent = 'Küldés...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nev: nev.value.trim(),
          email: email.value.trim(),
          ertesites: cb.checked
        })
      });
    } catch(e) {}

    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
  }
</script>
</body>
</html>
